<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自習室管理システム - ログイン</title>
    <style>
      :root {
        --text: #37475a;
        --muted: #79889a;
        --primary: #4f88ff;
        --primary-soft: rgba(79, 136, 255, 0.14);
        --warm: #ffba62;
        --surface: rgba(255, 255, 255, 0.95);
        --surface-border: rgba(255, 255, 255, 0.88);
        --success-bg: #eefbf3;
        --success-text: #18794e;
        --error-bg: #fff1f3;
        --error-text: #b42345;
        --shadow: 0 20px 48px rgba(96, 117, 141, 0.18);
      }

      html {
        box-sizing: border-box;
      }

      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "M PLUS Rounded 1c", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(160deg, #fff8f0 0%, #eef7ff 55%, #f7fff9 100%);
        position: relative;
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        width: 260px;
        height: 260px;
        top: -120px;
        right: -100px;
        background: rgba(255, 186, 98, 0.16);
      }

      body::after {
        width: 280px;
        height: 280px;
        left: -120px;
        bottom: -120px;
        background: rgba(79, 136, 255, 0.12);
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 392px;
        padding: 28px 18px 22px;
        border-radius: 28px;
        background: var(--surface);
        border: 1px solid var(--surface-border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .header {
        text-align: center;
        margin-bottom: 20px;
      }

      .icon {
        width: 68px;
        height: 68px;
        margin: 0 auto 14px;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        background: linear-gradient(135deg, #fff1d9, #e3f2ff);
        box-shadow: 0 12px 24px rgba(79, 136, 255, 0.12);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.7rem;
        font-weight: 800;
        color: #31495f;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.7;
      }

      form {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      label {
        color: #617284;
        font-size: 0.93rem;
        font-weight: 700;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        font: inherit;
        font-size: 17px;
        color: var(--text);
        background: #ffffff;
        border: 1.5px solid #cfdfee;
        border-radius: 12px;
        padding: 16px 15px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      }

      input::placeholder {
        color: #a5b3c1;
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 5px var(--primary-soft);
        background: #ffffff;
        transform: translateY(-1px);
      }

      .password-container {
        position: relative;
      }

      .password-container input {
        padding-right: 50px;
      }

      .toggle-password {
        position: absolute;
        top: 50%;
        right: 14px;
        transform: translateY(-50%);
        font-size: 18px;
        cursor: pointer;
        opacity: 0.68;
        transition: opacity 0.2s ease;
      }

      .toggle-password:hover {
        opacity: 1;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 16px 18px;
        margin-top: 4px;
        font: inherit;
        font-size: 1rem;
        font-weight: 800;
        color: #ffffff;
        cursor: pointer;
        background: linear-gradient(135deg, var(--warm) 0%, var(--primary) 100%);
        box-shadow: 0 14px 26px rgba(79, 136, 255, 0.24);
        transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 30px rgba(79, 136, 255, 0.28);
        filter: brightness(1.03);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.72;
        transform: none;
        box-shadow: 0 8px 14px rgba(0, 0, 0, 0.08);
      }

      .hint {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.84rem;
        text-align: center;
        line-height: 1.6;
      }

      .message {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 15px;
        display: none;
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.6;
        text-align: center;
      }

      .error {
        background: var(--error-bg);
        color: var(--error-text);
        border: 1px solid rgba(180, 35, 69, 0.16);
      }

      .success {
        background: var(--success-bg);
        color: var(--success-text);
        border: 1px solid rgba(24, 121, 78, 0.18);
      }

      .loader {
        border: 4px solid #eff4fb;
        border-top: 4px solid var(--primary);
        border-radius: 50%;
        width: 28px;
        height: 28px;
        animation: spin 1s linear infinite;
        margin: 16px auto 0;
        display: none;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @media (min-width: 640px) {
        body {
          padding: 24px;
        }

        .container {
          max-width: 392px;
          padding: 34px 28px 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="icon">📚</div>
        <h1>ログイン</h1>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="userId">生徒ID</label>
          <input type="text" id="userId" name="userId" required placeholder="生徒ID">
        </div>

        <div class="field">
          <label for="password">パスワード</label>
          <div class="password-container">
            <input type="password" id="password" name="password" required placeholder="パスワード">
            <span class="toggle-password" onclick="togglePassword()">👁</span>
          </div>
        </div>

        <button type="submit">ログイン</button>
      </form>

      <div id="loader" class="loader"></div>
      <div id="messageArea" class="message" style="display:none;"></div>
    </div>

    <script>
      const webAppUrl = "<?!= webAppUrl ?>";

      document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();
        handleLogin();
      });

      function handleLogin() {
        const userId = document.getElementById('userId').value;
        const password = document.getElementById('password').value;
        const messageArea = document.getElementById('messageArea');
        const loader = document.getElementById('loader');

        if (!userId || !password) {
          showMessage('生徒IDとパスワードを入力してください。', 'error');
          return;
        }

        messageArea.style.display = 'none';
        loader.style.display = 'block';
        document.querySelector('button').disabled = true;

        google.script.run
          .withSuccessHandler(function(response) {
            loader.style.display = 'none';
            document.querySelector('button').disabled = false;
            if (response.success) {
              showMessage('ログイン成功！ページに移動します...', 'success');
              let targetUrl;
              if (response.isAdmin) {
                targetUrl = webAppUrl + "?page=admin&token=" + encodeURIComponent(response.sessionToken);
              } else {
                if (response.goalStatus && response.goalStatus.required) {
                  const gs = response.goalStatus;
                  targetUrl = `${webAppUrl}?page=goal&token=${encodeURIComponent(response.sessionToken)}&userId=${encodeURIComponent(userId)}&studentName=${encodeURIComponent(response.studentName)}&lastMonthGoal=${encodeURIComponent(gs.lastMonthData.goal)}&currentYear=${gs.currentYear}&currentMonth=${gs.currentMonth}&lastMonthYear=${gs.lastMonthYear}&lastMonth=${gs.lastMonth}`;
                } else {
                  targetUrl = `${webAppUrl}?page=main&token=${encodeURIComponent(response.sessionToken)}&userId=${encodeURIComponent(userId)}&studentName=${encodeURIComponent(response.studentName)}`;
                }
              }
              window.top.location.href = targetUrl;
            } else {
              showMessage(response.message, 'error');
            }
          })
          .withFailureHandler(function(error) {
            loader.style.display = 'none';
            document.querySelector('button').disabled = false;
            showMessage('エラーが発生しました: ' + error.message, 'error');
          })
          .authenticateUser(userId, password);
      }

      function showMessage(msg, type) {
        const messageArea = document.getElementById('messageArea');
        messageArea.textContent = msg;
        messageArea.className = 'message ' + type;
        messageArea.style.display = 'block';
      }

      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const icon = document.querySelector(".toggle-password");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          icon.textContent = "🙈";
        } else {
          passwordInput.type = "password";
          icon.textContent = "👁";
        }
      }
    </script>
  </body>
</html>
